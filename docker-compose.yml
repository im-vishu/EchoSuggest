services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: echosuggest
      MONGO_INITDB_ROOT_PASSWORD: echosuggest_dev
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"

volumes:
  mongo_data:
